name: Sync Fork

on:
  schedule:
    - cron: '0 2 * * *' # 2:00 AM UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork with upstream
        run: gh repo sync jstgnkl/emdash --branch main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
