name: Sync Fork

on:
  schedule:
    - cron: '0 2 * * *' # 2:00 AM UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork with upstream
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.mergeUpstream({
              owner: 'jstgnkl',
              repo: 'emdash',
              branch: 'main'
            });
