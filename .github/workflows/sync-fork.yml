name: Sync Fork

on:
  schedule:
    - cron: '0 2 * * *' # 2:00 AM UTC daily
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork with upstream
        run: gh repo sync jstgnkl/emdash --branch main
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
